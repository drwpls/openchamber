name: Build OpenChamber web binaries

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-web-binary:
    name: Build ${{ matrix.name }} binary
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            runner: ubuntu-latest
            bun_target: bun-linux-x64
            output_name: openchamber-linux-x64
            sherpa_package: sherpa-onnx-linux-x64
          - name: macos-arm64
            runner: macos-14
            bun_target: bun-darwin-arm64
            output_name: openchamber-macos-arm64
            sherpa_package: sherpa-onnx-darwin-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Set fork build stamp
        shell: bash
        run: echo "OPENCHAMBER_FORK_BUILD_STAMP=fork-$(date -u +%Y%m%d%H%M%S)" >> "$GITHUB_ENV"

      - name: Build web assets
        run: bun run build:web

      - name: Generate embedded dist manifest
        run: node packages/web/scripts/generate-embedded-dist-manifest.mjs

      - name: Build binary
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          bun build \
            --compile \
            --target=${{ matrix.bun_target }} \
            ./packages/web/bin/cli.js \
            --outfile artifacts/${{ matrix.output_name }}
          chmod +x artifacts/${{ matrix.output_name }}

      - name: Bundle native dictation modules
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/node_modules
          SHERPA_NODE_DIR="$(node -e "const { createRequire } = require('node:module'); const path = require('node:path'); const requireFromWeb = createRequire(path.resolve('packages/web/package.json')); console.log(path.dirname(requireFromWeb.resolve('sherpa-onnx-node/package.json')));")"
          SHERPA_PLATFORM_DIR="$(node -e "const { createRequire } = require('node:module'); const path = require('node:path'); const requireFromWeb = createRequire(path.resolve('packages/web/package.json')); console.log(path.dirname(requireFromWeb.resolve('${{ matrix.sherpa_package }}/package.json')));")"
          test -f "$SHERPA_NODE_DIR/package.json"
          test -f "$SHERPA_PLATFORM_DIR/package.json"
          cp -aL "$SHERPA_NODE_DIR" artifacts/node_modules/sherpa-onnx-node
          cp -aL "$SHERPA_PLATFORM_DIR" artifacts/node_modules/${{ matrix.sherpa_package }}

      - name: Add README
        shell: bash
        run: |
          cat > artifacts/README-${{ matrix.name }}.txt <<EOF
          Experimental OpenChamber single-file binary built with \`bun build --compile\`.

          Target: ${{ matrix.bun_target }}

          Notes:
          - The web dist assets are embedded in this binary through Bun file imports.
          - No external dist directory is required for the browser UI.
          - Native dictation modules are included under ./node_modules and must stay next to the binary.
          EOF
          perl -0pi -e 's/^ {10}//mg' artifacts/README-${{ matrix.name }}.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openchamber-binary-${{ matrix.name }}-${{ github.sha }}
          path: artifacts/
          if-no-files-found: error
          retention-days: 14

  publish-release:
    name: Publish public release assets
    runs-on: ubuntu-latest
    needs: build-web-binary
    if: github.event_name == 'push'
    steps:
      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: openchamber-binary-*-${{ github.sha }}
          path: downloaded-artifacts

      - name: Package release archives
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          for artifact_dir in downloaded-artifacts/openchamber-binary-*-${GITHUB_SHA}; do
            test -d "$artifact_dir"
            artifact_name="$(basename "$artifact_dir")"
            tar -C "$artifact_dir" -czf "release-assets/${artifact_name}.tar.gz" .
          done
          ls -la release-assets

      - name: Publish GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: openchamber-binary-${{ github.sha }}
        run: |
          set -euo pipefail
          title="OpenChamber binary ${GITHUB_SHA::12}"
          notes=$'Public binary archives for this fork build.\n\nThe web dist assets are embedded in the binary. Native dictation modules are bundled under ./node_modules and must stay next to the binary.'
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" release-assets/* --clobber --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$RELEASE_TAG" release-assets/* \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "$title" \
              --notes "$notes"
          fi
