name: Build OpenChamber web artifact

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-web-artifact:
    name: Build installable web package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Set fork build stamp
        run: echo "OPENCHAMBER_FORK_BUILD_STAMP=fork-$(date -u +%Y%m%d%H%M%S)" >> "$GITHUB_ENV"

      - name: Build web package
        run: bun run build:web

      - name: Pack web package
        run: |
          mkdir -p artifacts
          npm pack ./packages/web --pack-destination artifacts
          mv artifacts/*.tgz artifacts/openchamber-web.tgz

      - name: Add install helper
        run: |
          cat > artifacts/install-openchamber-artifact.sh <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail

          artifact_dir="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          package_tgz="$artifact_dir/openchamber-web.tgz"

          if [[ ! -f "$package_tgz" ]]; then
            echo "Missing artifact: $package_tgz" >&2
            exit 1
          fi

          if command -v bun >/dev/null 2>&1; then
            bun add -g "$package_tgz"
          elif command -v npm >/dev/null 2>&1; then
            npm install -g "$package_tgz"
          else
            echo "Install bun or npm first." >&2
            exit 1
          fi

          if command -v systemctl >/dev/null 2>&1; then
            systemctl --user restart openchamber.service 2>/dev/null || true
          fi
          EOF
          chmod +x artifacts/install-openchamber-artifact.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openchamber-web-${{ github.sha }}
          path: artifacts/
          if-no-files-found: error
          retention-days: 14
